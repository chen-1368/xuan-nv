<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b68ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7b68ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="yin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d5b7"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
    <linearGradient id="yang" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a3f6b"/>
      <stop offset="100%" stop-color="#2d2545"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="#7b68ee" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- 外圈阵法纹路 -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#7b68ee" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="8 4"/>
  <circle cx="64" cy="64" r="50" fill="none" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="3 6"/>

  <!-- 八方阵法线 -->
  <g stroke="#7b68ee" stroke-width="0.6" stroke-opacity="0.25">
    <line x1="64" y1="10" x2="64" y2="24"/>
    <line x1="64" y1="104" x2="64" y2="118"/>
    <line x1="10" y1="64" x2="24" y2="64"/>
    <line x1="104" y1="64" x2="118" y2="64"/>
    <line x1="25.8" y1="25.8" x2="35.7" y2="35.7"/>
    <line x1="92.3" y1="92.3" x2="102.2" y2="102.2"/>
    <line x1="102.2" y1="25.8" x2="92.3" y2="35.7"/>
    <line x1="35.7" y1="92.3" x2="25.8" y2="102.2"/>
  </g>

  <!-- 中心光晕 -->
  <circle cx="64" cy="64" r="30" fill="url(#glow)"/>

  <!-- 阴阳玉主体 -->
  <g filter="url(#softglow)">
    <!-- 太极底 -->
    <circle cx="64" cy="64" r="24" fill="url(#yang)"/>
    <!-- 阳半 (上) -->
    <path d="M64,40 A24,24 0 0,1 64,88 A12,12 0 0,1 64,64 A12,12 0 0,0 64,40Z" fill="url(#yin)"/>
    <!-- 阳中阴点 -->
    <circle cx="64" cy="52" r="4" fill="url(#yang)"/>
    <!-- 阴中阳点 -->
    <circle cx="64" cy="76" r="4" fill="url(#yin)"/>
  </g>

  <!-- 环绕的阴阳玉 (小) -->
  <g opacity="0.7">
    <circle cx="64" cy="20" r="5" fill="url(#yin)" opacity="0.8"/>
    <circle cx="64" cy="20" r="2" fill="url(#yang)"/>

    <circle cx="95.1" cy="32" r="5" fill="url(#yin)" opacity="0.7"/>
    <circle cx="95.1" cy="32" r="2" fill="url(#yang)"/>

    <circle cx="108" cy="64" r="5" fill="url(#yang)" opacity="0.8"/>
    <circle cx="108" cy="64" r="2" fill="url(#yin)"/>

    <circle cx="95.1" cy="96" r="5" fill="url(#yin)" opacity="0.6"/>
    <circle cx="95.1" cy="96" r="2" fill="url(#yang)"/>

    <circle cx="64" cy="108" r="5" fill="url(#yang)" opacity="0.7"/>
    <circle cx="64" cy="108" r="2" fill="url(#yin)"/>

    <circle cx="32.9" cy="96" r="5" fill="url(#yin)" opacity="0.8"/>
    <circle cx="32.9" cy="96" r="2" fill="url(#yang)"/>

    <circle cx="20" cy="64" r="5" fill="url(#yang)" opacity="0.6"/>
    <circle cx="20" cy="64" r="2" fill="url(#yin)"/>

    <circle cx="32.9" cy="32" r="5" fill="url(#yin)" opacity="0.7"/>
    <circle cx="32.9" cy="32" r="2" fill="url(#yang)"/>
  </g>

  <!-- "玄" 字 -->
  <text x="64" y="68" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#e8d5b7" opacity="0.15">玄</text>
</svg>
